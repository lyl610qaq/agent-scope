<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentScope Java Demo</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef1f4;
            --panel: #ffffff;
            --ink: #17202a;
            --muted: #596574;
            --accent: #2563eb;
            --accent-deep: #1d4ed8;
            --line: #d8dee6;
            --soft: #f6f8fa;
            --shadow: 0 10px 30px rgba(23, 32, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background: var(--bg);
            padding: 24px;
        }

        .shell {
            width: min(1080px, 100%);
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .hero {
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--line);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-deep);
            font-weight: 700;
        }

        h1 {
            margin: 8px 0 8px;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .hero p {
            margin: 0;
            max-width: 760px;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .panel {
            min-width: 0;
            padding: 24px 28px 28px;
        }

        .panel + .panel {
            border-left: 1px solid var(--line);
            background: var(--soft);
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
        }

        input,
        textarea {
            width: 100%;
            border-radius: 6px;
            border: 1px solid var(--line);
            padding: 12px 14px;
            font: inherit;
            color: var(--ink);
            background: #fff;
        }

        input:focus,
        textarea:focus {
            outline: 2px solid rgba(37, 99, 235, 0.18);
            border-color: var(--accent);
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        .field + .field {
            margin-top: 16px;
        }

        .actions {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            min-height: 40px;
            border-radius: 6px;
            padding: 10px 16px;
            font: inherit;
            font-weight: 700;
            color: #fff;
            background: var(--accent);
            cursor: pointer;
            transition: background 140ms ease;
        }

        button:hover {
            background: var(--accent-deep);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.75;
        }

        .status {
            font-size: 14px;
            color: var(--muted);
        }

        .answer-box {
            min-height: 250px;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: #fff;
            padding: 16px;
            white-space: pre-wrap;
            line-height: 1.7;
            overflow-wrap: anywhere;
        }

        .tips {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            overflow-wrap: anywhere;
        }

        .runtime {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 6px;
            border-left: 3px solid var(--accent);
            background: #eaf1ff;
            color: var(--ink);
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-line;
            overflow-wrap: anywhere;
        }

        code {
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.95em;
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .panel + .panel {
                border-left: none;
                border-top: 1px solid var(--line);
            }

            .hero,
            .panel {
                padding-left: 18px;
                padding-right: 18px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<main class="shell">
    <section class="hero">
        <div class="eyebrow">Memory Workspace</div>
        <h1>AgentScope Java Demo 记忆工作台</h1>
        <p>
            在同一会话中连续提问，短期记忆、长期记忆与向量知识库会共同组成模型上下文。
            登录和用户管理由 RuoYi-Cloud-Plus 后端负责，当前页面只发送登录 token。
        </p>
    </section>

    <section class="grid">
        <div class="panel">
            <div class="field">
                <label for="token">RuoYi Token</label>
                <input id="token" type="password" autocomplete="off" placeholder="粘贴 RuoYi 登录 token">
            </div>
            <div class="field">
                <label for="prompt">消息</label>
                <textarea id="prompt" placeholder="输入你的问题">请用一段话介绍 AgentScope Java。</textarea>
            </div>
            <div class="actions">
                <button id="send" type="button">发送</button>
                <span id="status" class="status">就绪</span>
            </div>
        </div>

        <div class="panel">
            <label for="answer">回答</label>
            <div id="answer" class="answer-box">模型回答会显示在这里。</div>
            <div class="tips">
                短期记忆保存在当前进程；长期记忆在 pgvector 启用后按 RuoYi 用户写入 PostgreSQL；
                <code>data/knowledge</code> 中的知识可通过 pgvector 召回。
            </div>
            <div id="runtime" class="runtime">正在加载运行状态...</div>
        </div>
    </section>
</main>

<script>
    const promptInput = document.getElementById("prompt");
    const tokenInput = document.getElementById("token");
    const sendButton = document.getElementById("send");
    const statusText = document.getElementById("status");
    const answerBox = document.getElementById("answer");
    const runtimeBox = document.getElementById("runtime");
    const conversationStorageKey = "agentscope.conversationId";
    const tokenStorageKey = "agentscope.ruoyiToken";
    let tokenHeaderName = "Authorization";
    let conversationId = sessionStorage.getItem(conversationStorageKey);

    if (!conversationId) {
        conversationId = typeof crypto.randomUUID === "function"
            ? crypto.randomUUID()
            : "conversation-" + Date.now() + "-" + Math.random().toString(16).slice(2);
        sessionStorage.setItem(conversationStorageKey, conversationId);
    }

    tokenInput.value = sessionStorage.getItem(tokenStorageKey) || "";
    tokenInput.addEventListener("input", () => {
        sessionStorage.setItem(tokenStorageKey, tokenInput.value.trim());
    });

    async function loadRuntimeConfig() {
        try {
            const response = await fetch("/api/config");
            const config = await response.json();
            const auth = config.ruoyiAuth || {};
            const knowledge = config.knowledge || {};
            const longTermMemory = config.longTermMemory || {};
            tokenHeaderName = auth.tokenHeaderName || "Authorization";
            runtimeBox.textContent = [
                "聊天模型：" + (config.modelName || "未配置") +
                    (config.apiKeyConfigured ? " / API Key 已配置" : " / 缺少 API Key"),
                "RuoYi Token 来源：请先在 RuoYi 登录后粘贴已签发 Token",
                "RuoYi 鉴权 Header：" + tokenHeaderName,
                "知识召回：" + (knowledge.vectorTopK || 0) +
                    " → " + (knowledge.finalTopN || 0),
                "长期记忆召回：" + (longTermMemory.vectorTopK || 0) +
                    " → " + (longTermMemory.finalTopN || 0),
                "当前会话：" + conversationId
            ].join("\n");
        } catch (error) {
            runtimeBox.textContent = "运行状态加载失败：" + error.message;
        }
    }

    async function sendPrompt() {
        const message = promptInput.value.trim();
        if (!message) {
            statusText.textContent = "请输入消息";
            answerBox.textContent = "消息为空，尚未发送。";
            return;
        }

        sendButton.disabled = true;
        statusText.textContent = "正在请求...";
        answerBox.textContent = "正在等待回答...";

        try {
            const token = tokenInput.value.trim();
            const headers = { "Content-Type": "application/json" };
            if (token) {
                headers[tokenHeaderName] = token.toLowerCase().startsWith("bearer ")
                    ? token
                    : "Bearer " + token;
            }

            const response = await fetch("/api/chat", {
                method: "POST",
                headers,
                body: JSON.stringify({ conversationId, message })
            });

            const text = await response.text();
            let payload = null;

            if (text) {
                try {
                    payload = JSON.parse(text);
                } catch (error) {
                    payload = null;
                }
            }

            if (!response.ok) {
                const messageText = payload && payload.message ? payload.message : text || "Request failed.";
                throw new Error(messageText);
            }

            answerBox.textContent = payload && payload.answer ? payload.answer : "模型没有返回内容。";
            statusText.textContent = "已完成";
        } catch (error) {
            answerBox.textContent = "请求失败：" + error.message;
            statusText.textContent = "失败";
        } finally {
            sendButton.disabled = false;
        }
    }

    sendButton.addEventListener("click", sendPrompt);
    promptInput.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
            sendPrompt();
        }
    });

    loadRuntimeConfig();
</script>
</body>
</html>
