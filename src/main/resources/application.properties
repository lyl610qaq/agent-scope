spring.application.name=demo-scope

agentscope.openai.api-key=${OPENAI_API_KEY:}
agentscope.openai.model-name=${AGENTSCOPE_OPENAI_MODEL_NAME:Pro/zai-org/GLM-4.7}
agentscope.openai.base-url=${OPENAI_BASE_URL:https://api.siliconflow.cn/v1}
agentscope.chat.system-prompt=${AGENTSCOPE_SYSTEM_PROMPT:You are a helpful AI assistant.}

agentscope.auth.ruoyi.token-name=${AGENTSCOPE_RUOYI_TOKEN_NAME:Authorization}
spring.data.redis.host=${AGENTSCOPE_RUOYI_REDIS_HOST:localhost}
spring.data.redis.port=${AGENTSCOPE_RUOYI_REDIS_PORT:6379}
spring.data.redis.database=${AGENTSCOPE_RUOYI_REDIS_DATABASE:0}
spring.data.redis.username=${AGENTSCOPE_RUOYI_REDIS_USERNAME:}
spring.data.redis.password=${AGENTSCOPE_RUOYI_REDIS_PASSWORD:}

agentscope.interview.enabled=${AGENTSCOPE_INTERVIEW_ENABLED:false}
agentscope.interview.max-main-questions=${AGENTSCOPE_INTERVIEW_MAX_MAIN_QUESTIONS:5}
agentscope.interview.max-follow-ups=${AGENTSCOPE_INTERVIEW_MAX_FOLLOW_UPS:2}

agentscope.memory.short-term.max-turns=${AGENTSCOPE_MEMORY_SHORT_TERM_MAX_TURNS:10}

agentscope.embedding.api-key=${SILICONFLOW_API_KEY:}
agentscope.embedding.base-url=${AGENTSCOPE_EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}
agentscope.embedding.model=${AGENTSCOPE_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-4B}
agentscope.embedding.dimensions=${AGENTSCOPE_EMBEDDING_DIMENSIONS:1024}

agentscope.retrieval.knowledge.vector-top-k=${AGENTSCOPE_KNOWLEDGE_VECTOR_TOP_K:30}
agentscope.retrieval.knowledge.final-top-n=${AGENTSCOPE_KNOWLEDGE_FINAL_TOP_N:6}
agentscope.retrieval.knowledge.min-score=${AGENTSCOPE_KNOWLEDGE_MIN_SCORE:0.70}
agentscope.retrieval.long-term-memory.vector-top-k=${AGENTSCOPE_LONG_TERM_VECTOR_TOP_K:20}
agentscope.retrieval.long-term-memory.final-top-n=${AGENTSCOPE_LONG_TERM_FINAL_TOP_N:5}
agentscope.retrieval.long-term-memory.min-score=${AGENTSCOPE_LONG_TERM_MIN_SCORE:0.72}

agentscope.pgvector.enabled=${AGENTSCOPE_PGVECTOR_ENABLED:false}
agentscope.pgvector.url='127.0.0.1:5432/agentscope'
agentscope.pgvector.username='postgres'
agentscope.pgvector.password='123456'
