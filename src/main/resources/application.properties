spring.application.name=demo-scope

agentscope.openai.api-key=${OPENAI_API_KEY:}
agentscope.openai.model-name=${AGENTSCOPE_OPENAI_MODEL_NAME:Pro/zai-org/GLM-4.7}
agentscope.openai.base-url=${OPENAI_BASE_URL:https://api.siliconflow.cn/v1}
agentscope.chat.system-prompt=${AGENTSCOPE_SYSTEM_PROMPT:You are a helpful AI assistant.}

agentscope.auth.ruoyi.token-name=${AGENTSCOPE_RUOYI_TOKEN_NAME:Authorization}
spring.data.redis.host=${AGENTSCOPE_RUOYI_REDIS_HOST:localhost}
spring.data.redis.port=${AGENTSCOPE_RUOYI_REDIS_PORT:6379}
spring.data.redis.database=${AGENTSCOPE_RUOYI_REDIS_DATABASE:0}
spring.data.redis.username=${AGENTSCOPE_RUOYI_REDIS_USERNAME:}
spring.data.redis.password=${AGENTSCOPE_RUOYI_REDIS_PASSWORD:}

agentscope.memory.short-term.max-turns=${AGENTSCOPE_MEMORY_MAX_TURNS:10}
agentscope.memory.long-term.top-k=${AGENTSCOPE_LONG_TERM_MEMORY_TOP_K:5}
agentscope.memory.long-term.max-distance=${AGENTSCOPE_LONG_TERM_MEMORY_MAX_DISTANCE:}

agentscope.embedding.api-key=${SILICONFLOW_API_KEY:${OPENAI_API_KEY:}}
agentscope.embedding.base-url=${SILICONFLOW_EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}
agentscope.embedding.model=${SILICONFLOW_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-4B}
agentscope.embedding.dimensions=${SILICONFLOW_EMBEDDING_DIMENSIONS:1024}

agentscope.pgvector.enabled=${AGENTSCOPE_PGVECTOR_ENABLED:false}
agentscope.pgvector.url=${PGVECTOR_URL:}
agentscope.pgvector.username=${PGVECTOR_USERNAME:}
agentscope.pgvector.password=${PGVECTOR_PASSWORD:}

agentscope.rag.knowledge-dir=${AGENTSCOPE_RAG_KNOWLEDGE_DIR:data/knowledge}
agentscope.rag.top-k=${AGENTSCOPE_RAG_TOP_K:3}
agentscope.rag.max-distance=${AGENTSCOPE_RAG_MAX_DISTANCE:}
agentscope.rag.max-chunk-chars=${AGENTSCOPE_RAG_MAX_CHUNK_CHARS:2000}
